<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Starsight Group</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Tenor+Sans&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --sky-deep: #03060f;
    --sky-mid: #060d1e;
    --sky-horizon: #0a1428;
    --water-dark: #020509;
    --water-mid: #040c18;
    --star-bright: #e8f0ff;
    --star-mid: #a8bce8;
    --star-dim: #5a7ab8;
    --gold: #c8a96e;
    --gold-dim: #8a6e3e;
    --text-primary: #dde8f8;
    --text-secondary: #7a9acc;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: var(--sky-deep);
    font-family: 'Cormorant Garamond', Georgia, serif;
    color: var(--text-primary);
    cursor: default;
  }

  canvas#sky {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
  }

  .scene {
    position: fixed;
    inset: 0;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }

  /* Water reflection layer */
  .water {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 28vh;
    z-index: 2;
    background: linear-gradient(to bottom, transparent, var(--water-dark) 60%);
    pointer-events: none;
  }

  /* Horizon glow */
  .horizon {
    position: fixed;
    bottom: 26vh;
    left: 0;
    right: 0;
    height: 2px;
    z-index: 3;
    background: linear-gradient(to right, transparent, var(--gold-dim) 20%, var(--gold-dim) 80%, transparent);
    opacity: 0.25;
    pointer-events: none;
  }

  /* Sailboat SVG */
  .boat-wrap {
    position: fixed;
    bottom: 22vh;
    left: 50%;
    transform: translateX(-50%);
    z-index: 4;
    pointer-events: none;
    animation: sway 8s ease-in-out infinite;
    transform-origin: bottom center;
  }

  @keyframes sway {
    0%, 100% { transform: translateX(-50%) rotate(-0.8deg) translateY(0px); }
    25% { transform: translateX(-50%) rotate(0.4deg) translateY(-2px); }
    50% { transform: translateX(-50%) rotate(1deg) translateY(0px); }
    75% { transform: translateX(-50%) rotate(-0.2deg) translateY(-1px); }
  }

  /* Water shimmer reflection */
  .reflection {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 28vh;
    z-index: 3;
    pointer-events: none;
    overflow: hidden;
  }

  .reflection canvas {
    width: 100%;
    height: 100%;
  }

  /* Content */
  .content {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
    pointer-events: none;
  }

  .wordmark {
    text-align: center;
    letter-spacing: 0.22em;
    font-family: 'Tenor Sans', sans-serif;
    font-weight: 400;
    font-size: clamp(1.1rem, 3vw, 1.6rem);
    text-transform: uppercase;
    color: var(--text-primary);
    opacity: 0;
    animation: fadeUp 2.4s cubic-bezier(0.16, 1, 0.3, 1) 0.8s forwards;
  }

  .rule {
    width: 1px;
    height: 48px;
    background: linear-gradient(to bottom, transparent, var(--gold) 50%, transparent);
    margin: 2rem auto;
    opacity: 0;
    animation: fadeIn 2s ease 1.6s forwards;
  }

  .tagline {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-style: italic;
    font-weight: 300;
    font-size: clamp(0.75rem, 1.8vw, 1rem);
    letter-spacing: 0.12em;
    color: var(--text-secondary);
    text-align: center;
    opacity: 0;
    animation: fadeUp 2s cubic-bezier(0.16, 1, 0.3, 1) 2s forwards;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  /* Contact */
  .contact {
    position: fixed;
    bottom: 2.5rem;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    text-align: center;
    pointer-events: all;
    opacity: 0;
    animation: fadeIn 2s ease 2.8s forwards;
  }

  .contact a {
    font-family: 'Tenor Sans', sans-serif;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-secondary);
    text-decoration: none;
    transition: color 0.4s ease;
    border-bottom: 1px solid transparent;
    padding-bottom: 2px;
  }

  .contact a:hover {
    color: var(--gold);
    border-bottom-color: var(--gold-dim);
  }

  /* Subtle moon */
  .moon {
    position: fixed;
    top: 12vh;
    right: 18vw;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #f0e8d0, #c8b87a 40%, #8a7040 100%);
    box-shadow: 0 0 40px 8px rgba(200, 169, 110, 0.08), 0 0 80px 20px rgba(200, 169, 110, 0.04);
    z-index: 2;
    opacity: 0;
    animation: fadeIn 3s ease 0.4s forwards;
  }

  /* Milky way band */
  .milkyway {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 1;
    pointer-events: none;
    opacity: 0.06;
    background: radial-gradient(ellipse 40% 70% at 65% 30%, rgba(120, 160, 255, 0.4) 0%, transparent 70%);
  }
</style>
</head>
<body>

<canvas id="sky"></canvas>
<div class="milkyway"></div>
<div class="moon"></div>
<div class="horizon"></div>

<!-- Sailboat -->
<div class="boat-wrap">
  <svg width="120" height="160" viewBox="0 0 120 160" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Main sail -->
    <path d="M62 18 L62 128 L18 118 Z" fill="rgba(220,230,248,0.07)" stroke="rgba(200,220,255,0.18)" stroke-width="0.5"/>
    <!-- Foresail / jib -->
    <path d="M62 38 L62 128 L95 112 Z" fill="rgba(220,230,248,0.05)" stroke="rgba(200,220,255,0.13)" stroke-width="0.5"/>
    <!-- Mast -->
    <line x1="62" y1="12" x2="62" y2="130" stroke="rgba(200,215,248,0.35)" stroke-width="1"/>
    <!-- Boom -->
    <line x1="28" y1="128" x2="96" y2="128" stroke="rgba(200,215,248,0.25)" stroke-width="0.8"/>
    <!-- Hull -->
    <path d="M18 128 Q60 148 102 128 L96 135 Q60 156 24 135 Z" fill="rgba(15,25,50,0.9)" stroke="rgba(200,215,248,0.2)" stroke-width="0.5"/>
    <!-- Waterline reflection shimmer -->
    <path d="M24 140 Q60 152 96 140" stroke="rgba(200,169,110,0.15)" stroke-width="0.5" fill="none"/>
    <!-- Rigging lines -->
    <line x1="62" y1="14" x2="18" y2="118" stroke="rgba(200,215,248,0.1)" stroke-width="0.4"/>
    <line x1="62" y1="14" x2="95" y2="112" stroke="rgba(200,215,248,0.1)" stroke-width="0.4"/>
  </svg>
</div>

<!-- Water -->
<div class="water"></div>

<!-- Main content -->
<div class="content">
  <div class="wordmark">Starsight Group</div>
  <div class="rule"></div>
  <div class="tagline">AI &amp; Data Strategy · Boston</div>
</div>

<!-- Contact -->
<div class="contact">
  <a href="mailto:hello@starsightgroup.com">hello@starsightgroup.com</a>
</div>

<script>
// Star field — orrery-like slow drift
const canvas = document.getElementById('sky');
const ctx = canvas.getContext('2d');

let W, H, stars = [], shootingStars = [];
const STAR_COUNT = 280;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}

function randBell() {
  return (Math.random() + Math.random() + Math.random()) / 3;
}

function initStars() {
  stars = [];
  for (let i = 0; i < STAR_COUNT; i++) {
    const mag = Math.random();
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H * 0.78, // keep above horizon
      baseX: 0,
      baseY: 0,
      r: mag < 0.6 ? 0.4 + Math.random() * 0.5 :
         mag < 0.85 ? 0.8 + Math.random() * 0.6 :
         1.2 + Math.random() * 0.8,
      brightness: 0.3 + Math.random() * 0.7,
      twinkleSpeed: 0.4 + Math.random() * 2,
      twinklePhase: Math.random() * Math.PI * 2,
      driftSpeed: (Math.random() - 0.5) * 0.012,
      driftAngle: Math.random() * Math.PI * 2,
      driftRadius: 0.4 + Math.random() * 1.2,
      age: Math.random() * 1000,
      color: Math.random() < 0.15 ? '#d4e4ff' :
             Math.random() < 0.1 ? '#ffe8c8' : '#e8f0ff'
    });
    stars[i].baseX = stars[i].x;
    stars[i].baseY = stars[i].y;
  }
}

// Slow orrery-like rotation — all stars drift together subtly
let globalAngle = 0;
const ROTATION_SPEED = 0.00008;
let centerX, centerY;

function drawSky() {
  // Deep sky gradient
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#010408');
  grad.addColorStop(0.5, '#03060f');
  grad.addColorStop(0.75, '#060d1e');
  grad.addColorStop(0.85, '#0a1428');
  grad.addColorStop(1, '#020509');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
}

function drawWater() {
  const grad = ctx.createLinearGradient(0, H * 0.72, 0, H);
  grad.addColorStop(0, 'rgba(2,5,9,0)');
  grad.addColorStop(0.3, 'rgba(2,5,9,0.85)');
  grad.addColorStop(1, 'rgba(1,3,6,1)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, H * 0.72, W, H);

  // Water shimmer lines
  ctx.save();
  for (let i = 0; i < 8; i++) {
    const y = H * 0.76 + i * (H * 0.03);
    const alpha = 0.02 - i * 0.002;
    ctx.strokeStyle = `rgba(200,169,110,${alpha})`;
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(W * 0.1, y + Math.sin(Date.now() * 0.0003 + i) * 1.5);
    ctx.lineTo(W * 0.9, y + Math.sin(Date.now() * 0.0003 + i + 1) * 1.5);
    ctx.stroke();
  }
  ctx.restore();
}

function drawStars(t) {
  globalAngle += ROTATION_SPEED;
  centerX = W * 0.5;
  centerY = H * 0.22;

  stars.forEach(s => {
    s.age += 0.016;

    // Orrery rotation around celestial pole
    const dx = s.baseX - centerX;
    const dy = s.baseY - centerY;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const baseAngle = Math.atan2(dy, dx);
    const newAngle = baseAngle + globalAngle * (1 - dist / (Math.max(W, H) * 0.8));

    // Individual drift
    const driftX = Math.cos(s.driftAngle + s.age * 0.1) * s.driftRadius;
    const driftY = Math.sin(s.driftAngle + s.age * 0.1) * s.driftRadius;

    s.x = centerX + Math.cos(newAngle) * dist + driftX;
    s.y = centerY + Math.sin(newAngle) * dist + driftY;

    // Keep stars in sky, not water
    if (s.y > H * 0.75) return;
    if (s.x < 0 || s.x > W) return;

    // Twinkle
    const twinkle = 0.6 + 0.4 * Math.sin(s.age * s.twinkleSpeed + s.twinklePhase);
    const alpha = s.brightness * twinkle;

    ctx.save();
    ctx.globalAlpha = alpha;

    // Glow for brighter stars
    if (s.r > 1.0) {
      const glow = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.r * 5);
      glow.addColorStop(0, s.color);
      glow.addColorStop(1, 'transparent');
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r * 5, 0, Math.PI * 2);
      ctx.fill();
    }

    // Star core
    ctx.fillStyle = s.color;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();

    // Cross diffraction spike for bright stars
    if (s.r > 1.3 && twinkle > 0.8) {
      ctx.strokeStyle = s.color;
      ctx.lineWidth = 0.3;
      ctx.globalAlpha = alpha * 0.3;
      ctx.beginPath();
      ctx.moveTo(s.x - s.r * 4, s.y);
      ctx.lineTo(s.x + s.r * 4, s.y);
      ctx.moveTo(s.x, s.y - s.r * 4);
      ctx.lineTo(s.x, s.y + s.r * 4);
      ctx.stroke();
    }

    ctx.restore();
  });

  // Star water reflections
  ctx.save();
  ctx.globalAlpha = 0.06;
  stars.forEach(s => {
    if (s.r < 1.0) return;
    const reflectY = H - (s.y - H * 0.74) * 0.3 + H * 0.74;
    if (reflectY < H * 0.74 || reflectY > H) return;
    const wobble = Math.sin(Date.now() * 0.001 + s.x * 0.01) * 3;
    const grad = ctx.createLinearGradient(s.x + wobble, reflectY - 8, s.x + wobble, reflectY + 8);
    grad.addColorStop(0, 'transparent');
    grad.addColorStop(0.5, s.color);
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.fillRect(s.x + wobble - 0.5, reflectY - 8, 1, 16);
  });
  ctx.restore();
}

// Occasional shooting star
function maybeShootingStar() {
  if (Math.random() < 0.003 && shootingStars.length < 2) {
    shootingStars.push({
      x: Math.random() * W * 0.7 + W * 0.1,
      y: Math.random() * H * 0.3,
      vx: 3 + Math.random() * 4,
      vy: 1 + Math.random() * 2,
      life: 1,
      len: 60 + Math.random() * 80
    });
  }
}

function drawShootingStars() {
  shootingStars = shootingStars.filter(s => s.life > 0);
  shootingStars.forEach(s => {
    s.x += s.vx;
    s.y += s.vy;
    s.life -= 0.025;
    if (s.life <= 0) return;

    const grad = ctx.createLinearGradient(s.x - s.vx * 8, s.y - s.vy * 8, s.x, s.y);
    grad.addColorStop(0, 'transparent');
    grad.addColorStop(1, `rgba(232,240,255,${s.life * 0.8})`);
    ctx.save();
    ctx.strokeStyle = grad;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(s.x - s.len * (s.vx / 6), s.y - s.len * (s.vy / 6));
    ctx.lineTo(s.x, s.y);
    ctx.stroke();
    ctx.restore();
  });
}

function loop(t) {
  drawSky();
  drawStars(t);
  drawShootingStars();
  drawWater();
  maybeShootingStar();
  requestAnimationFrame(loop);
}

resize();
initStars();
window.addEventListener('resize', () => { resize(); initStars(); });
requestAnimationFrame(loop);
</script>
</body>
</html>
