<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Starsight Group</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Tenor+Sans&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --sky-deep: #02050d;
    --sky-mid: #050c1b;
    --sky-horizon: #0b1730;
    --water-dark: #01040a;
    --water-mid: #04101d;
    --star-bright: #edf3ff;
    --star-mid: #bacbef;
    --star-dim: #6c86bc;
    --gold: #c8a96e;
    --gold-soft: rgba(200, 169, 110, 0.18);
    --gold-dim: #8d7242;
    --text-primary: #d8e1f0;
    --text-secondary: #9aafd4;
    --boat-stroke: rgba(210, 224, 248, 0.34);
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: var(--sky-deep);
    font-family: 'Cormorant Garamond', Georgia, serif;
    color: var(--text-primary);
    cursor: default;
  }

  canvas#sky {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
  }

  .milkyway {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    opacity: 0.038;
    background:
      radial-gradient(ellipse 38% 62% at 68% 28%, rgba(138, 170, 255, 0.32) 0%, transparent 68%),
      radial-gradient(ellipse 22% 42% at 56% 34%, rgba(255, 255, 255, 0.08) 0%, transparent 72%);
  }

  .moon {
    position: fixed;
    top: 7vh;
    right: 8vw;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: radial-gradient(circle at 34% 34%, #f5edd7 0%, #d7c389 45%, #9f8450 100%);
    box-shadow:
      0 0 24px 4px rgba(200, 169, 110, 0.10),
      0 0 60px 14px rgba(200, 169, 110, 0.04);
    z-index: 2;
    opacity: 0;
    animation: fadeIn 3s ease 0.2s forwards;
  }

  .atmo-glow {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 23.5vh;
    height: 12vh;
    z-index: 2;
    pointer-events: none;
    background: linear-gradient(
      to top,
      rgba(200, 169, 110, 0.09) 0%,
      rgba(200, 169, 110, 0.045) 18%,
      rgba(200, 169, 110, 0.015) 36%,
      transparent 100%
    );
  }

  .horizon {
    position: fixed;
    bottom: 24vh;
    left: 0;
    right: 0;
    height: 1px;
    z-index: 3;
    pointer-events: none;
    background:
      linear-gradient(to right, transparent 0%, rgba(141,114,66,0.14) 10%, rgba(200,169,110,0.48) 50%, rgba(141,114,66,0.14) 90%, transparent 100%);
    box-shadow:
      0 0 10px 1px rgba(200, 169, 110, 0.10),
      0 0 28px rgba(200, 169, 110, 0.04);
  }

  .water {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 29vh;
    z-index: 2;
    background: linear-gradient(to bottom, transparent, rgba(1,4,10,0.92) 58%, rgba(1,4,10,1) 100%);
    pointer-events: none;
  }

  .content {
    position: fixed;
    inset: 0;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    transform: translateY(-14vh);
  }

  /* ── wordmark ── */
  .wordmark {
    text-align: center;
    letter-spacing: 0.30em;
    font-family: 'Tenor Sans', sans-serif;
    font-weight: 400;
    font-size: clamp(1.1rem, 3.1vw, 1.85rem);
    text-transform: uppercase;
    color: var(--text-primary);
    text-shadow:
      0 0 18px rgba(216, 225, 240, 0.10),
      0 0 60px rgba(200, 169, 110, 0.04);
    opacity: 0;
    animation: fadeUp 2.1s cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards;
  }

  /* ── celestial divider ── */
  .divider {
    position: relative;
    width: 80px;
    height: 72px;
    margin: 1.3rem auto 1.1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    animation: fadeIn 2s ease 1.1s forwards;
    flex-shrink: 0;
  }

  /* vertical arm */
  .divider::before {
    content: '';
    position: absolute;
    left: 50%;
    top: 0;
    transform: translateX(-50%);
    width: 1px;
    height: 100%;
    background: linear-gradient(
      to bottom,
      transparent 0%,
      rgba(200,169,110,0.18) 18%,
      rgba(200,169,110,0.68) 50%,
      rgba(200,169,110,0.18) 82%,
      transparent 100%
    );
    filter: drop-shadow(0 0 3px rgba(200,169,110,0.35));
  }

  /* horizontal arm */
  .divider::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 28px;
    height: 1px;
    background: linear-gradient(
      to right,
      transparent 0%,
      rgba(200,169,110,0.55) 30%,
      rgba(200,169,110,0.55) 70%,
      transparent 100%
    );
    filter: drop-shadow(0 0 3px rgba(200,169,110,0.30));
  }

  /* centre gem */
  .divider-gem {
    position: relative;
    z-index: 2;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: radial-gradient(circle at 40% 35%, #f0dba8, #c8a96e 60%, #8d7242);
    box-shadow:
      0 0  6px 2px rgba(200,169,110,0.50),
      0 0 14px 4px rgba(200,169,110,0.22),
      0 0 30px 8px rgba(200,169,110,0.08);
    animation: gemPulse 4s ease-in-out infinite;
  }

  /* diagonal spurs — rendered as an SVG overlay */
  .divider-spurs {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  @keyframes gemPulse {
    0%, 100% { box-shadow: 0 0  6px 2px rgba(200,169,110,0.50), 0 0 14px 4px rgba(200,169,110,0.22), 0 0 30px 8px rgba(200,169,110,0.08); }
    50%       { box-shadow: 0 0  8px 3px rgba(200,169,110,0.70), 0 0 20px 6px rgba(200,169,110,0.32), 0 0 42px 12px rgba(200,169,110,0.12); }
  }

  /* ── tagline ── */
  .tagline {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-style: italic;
    font-weight: 300;
    font-size: clamp(0.82rem, 1.65vw, 1.08rem);
    letter-spacing: 0.13em;
    color: var(--text-secondary);
    text-align: center;
    text-shadow: 0 0 10px rgba(154, 175, 212, 0.06);
    opacity: 0;
    animation: fadeUp 1.9s cubic-bezier(0.16, 1, 0.3, 1) 1.45s forwards;
  }

  .boat-wrap {
    position: fixed;
    bottom: 21.1vh;
    left: 50%;
    transform: translateX(-50%);
    z-index: 5;
    pointer-events: none;
    animation: sway 8s ease-in-out infinite;
    transform-origin: bottom center;
    filter: drop-shadow(0 0 8px rgba(160, 180, 220, 0.08));
  }

  .boat-glow {
    position: fixed;
    left: 50%;
    bottom: 20.6vh;
    width: 120px;
    height: 46px;
    transform: translateX(-50%);
    z-index: 4;
    pointer-events: none;
    background: radial-gradient(ellipse at center, rgba(200,169,110,0.085) 0%, rgba(200,169,110,0.03) 42%, transparent 75%);
    filter: blur(8px);
  }

  /* ── contact ── */
  .contact {
    position: fixed;
    bottom: 2.4rem;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    text-align: center;
    pointer-events: all;
    opacity: 0;
    animation: fadeIn 1.8s ease 2.3s forwards;
  }

  .contact a {
    font-family: 'Tenor Sans', sans-serif;
    font-size: 0.68rem;
    letter-spacing: 0.20em;
    text-transform: uppercase;
    color: rgba(154, 175, 212, 0.72);
    text-decoration: none;
    transition: color 0.4s ease, letter-spacing 0.4s ease;
    padding-bottom: 3px;
    border-bottom: 1px solid transparent;
    transition: color 0.35s ease, border-color 0.35s ease;
  }

  .contact a:hover {
    color: var(--gold);
    border-bottom-color: rgba(141,114,66,0.60);
  }

  /* ── subtle vignette ── */
  .vignette {
    position: fixed;
    inset: 0;
    z-index: 8;
    pointer-events: none;
    background: radial-gradient(ellipse 90% 90% at 50% 46%, transparent 55%, rgba(1,3,8,0.55) 100%);
  }

  @keyframes sway {
    0%, 100% { transform: translateX(-50%) rotate(-0.75deg) translateY(0px); }
    25%       { transform: translateX(-50%) rotate(0.25deg)  translateY(-2px); }
    50%       { transform: translateX(-50%) rotate(0.9deg)   translateY(0px); }
    75%       { transform: translateX(-50%) rotate(-0.1deg)  translateY(-1px); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  @media (max-width: 900px) {
    .moon { top: 6vh; right: 7vw; width: 26px; height: 26px; }
    .boat-wrap { bottom: 20.5vh; }
    .content { transform: translateY(-15vh); }
    .wordmark { letter-spacing: 0.20em; }
  }
</style>
</head>
<body>
<canvas id="sky"></canvas>
<div class="milkyway"></div>
<div class="moon"></div>
<div class="atmo-glow"></div>
<div class="horizon"></div>
<div class="vignette"></div>

<div class="boat-glow"></div>
<div class="boat-wrap" aria-hidden="true">
  <svg width="152" height="192" viewBox="0 0 110 145" xmlns="http://www.w3.org/2000/svg" fill="none">
    <defs>
      <linearGradient id="sailFillMain" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="rgba(225,235,250,0.22)"/>
        <stop offset="100%" stop-color="rgba(225,235,250,0.07)"/>
      </linearGradient>
      <linearGradient id="sailFillJib" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="rgba(225,235,250,0.16)"/>
        <stop offset="100%" stop-color="rgba(225,235,250,0.05)"/>
      </linearGradient>
      <linearGradient id="hullFill" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="rgba(20,28,48,0.98)"/>
        <stop offset="100%" stop-color="rgba(8,13,24,0.98)"/>
      </linearGradient>
      <radialGradient id="mastGlow" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="rgba(200,169,110,0.6)"/>
        <stop offset="100%" stop-color="rgba(200,169,110,0)"/>
      </radialGradient>
    </defs>

    <circle cx="55" cy="15" r="4.5" fill="url(#mastGlow)" opacity="0.55"/>

    <line x1="55" y1="14" x2="55" y2="112" stroke="rgba(205,220,245,0.58)" stroke-width="1.15"/>
    <path d="M55 20 L55 112 L22 106 Z" fill="url(#sailFillMain)" stroke="rgba(210,225,248,0.42)" stroke-width="0.85"/>
    <path d="M55 34 L55 112 L84 101 Z" fill="url(#sailFillJib)" stroke="rgba(210,225,248,0.30)" stroke-width="0.85"/>
    <line x1="55" y1="112" x2="84" y2="112" stroke="rgba(205,220,245,0.24)" stroke-width="0.7"/>

    <path d="M18 112 Q28 117 42 119 Q55 121 68 119 Q82 117 92 112 L86 120 Q74 127 55 129 Q36 127 24 120 Z"
      fill="url(#hullFill)"
      stroke="rgba(205,220,245,0.20)"
      stroke-width="0.85"/>

    <path d="M26 117 Q55 125 84 117" stroke="rgba(200,169,110,0.18)" stroke-width="0.8" stroke-linecap="round"/>
  </svg>
</div>

<div class="water"></div>

<div class="content">
  <div class="wordmark">Starsight Group</div>

  <!-- Celestial cross / star divider -->
  <div class="divider" role="presentation">
    <!-- Diagonal spurs as inline SVG -->
    <svg class="divider-spurs" viewBox="0 0 80 72" xmlns="http://www.w3.org/2000/svg" fill="none" aria-hidden="true">
      <defs>
        <linearGradient id="spurGrad" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="rgba(200,169,110,0)" />
          <stop offset="50%" stop-color="rgba(200,169,110,0.38)" />
          <stop offset="100%" stop-color="rgba(200,169,110,0)" />
        </linearGradient>
        <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
          <feGaussianBlur stdDeviation="1.2" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
      <!-- upper-left spur -->
      <line x1="40" y1="36" x2="26" y2="16" stroke="url(#spurGrad)" stroke-width="0.8" filter="url(#glow)" opacity="0.7"/>
      <!-- upper-right spur -->
      <line x1="40" y1="36" x2="54" y2="16" stroke="url(#spurGrad)" stroke-width="0.8" filter="url(#glow)" opacity="0.7"/>
      <!-- lower-left spur -->
      <line x1="40" y1="36" x2="26" y2="56" stroke="url(#spurGrad)" stroke-width="0.8" filter="url(#glow)" opacity="0.7"/>
      <!-- lower-right spur -->
      <line x1="40" y1="36" x2="54" y2="56" stroke="url(#spurGrad)" stroke-width="0.8" filter="url(#glow)" opacity="0.7"/>
      <!-- tiny tick marks at the outer arm tips for a compass-rose feel -->
      <circle cx="40" cy="4"  r="0.9" fill="rgba(200,169,110,0.30)"/>
      <circle cx="40" cy="68" r="0.9" fill="rgba(200,169,110,0.30)"/>
      <circle cx="8"  cy="36" r="0.9" fill="rgba(200,169,110,0.22)"/>
      <circle cx="72" cy="36" r="0.9" fill="rgba(200,169,110,0.22)"/>
    </svg>
    <!-- glowing centre gem -->
    <div class="divider-gem"></div>
  </div>

  <div class="tagline">AI &amp; Data Strategy · Boston</div>
</div>

<!-- Contact -->
<div class="contact">
  <a href="mailto:hello@starsightgroup.com">hello@starsightgroup.com</a>
</div>

<script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script>
<script>
const canvas = document.getElementById('sky');
const ctx = canvas.getContext('2d');

let W, H, stars = [], shootingStars = [];
const STAR_COUNT = 74;
let globalAngle = 0;
const ROTATION_SPEED = 0.000045;
let centerX, centerY;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}

function initStars() {
  stars = [];
  for (let i = 0; i < STAR_COUNT; i++) {
    const clusterBias = Math.random();
    const bright = Math.random();
    stars.push({
      x: Math.random() * W,
      y: (Math.pow(Math.random(), clusterBias < 0.6 ? 1.35 : 0.95)) * H * 0.72,
      baseX: 0,
      baseY: 0,
      r: bright < 0.68 ? 0.55 + Math.random() * 0.45 : bright < 0.9 ? 1.0 + Math.random() * 0.55 : 1.7 + Math.random() * 0.85,
      brightness: bright < 0.68 ? 0.28 + Math.random() * 0.22 : bright < 0.9 ? 0.48 + Math.random() * 0.25 : 0.70 + Math.random() * 0.25,
      twinkleSpeed: 0.35 + Math.random() * 1.35,
      twinklePhase: Math.random() * Math.PI * 2,
      driftAngle: Math.random() * Math.PI * 2,
      driftRadius: 0.15 + Math.random() * 0.65,
      age: Math.random() * 1000,
      color: Math.random() < 0.12 ? '#ffe7bf' : Math.random() < 0.28 ? '#dce8ff' : '#edf3ff'
    });
    stars[i].baseX = stars[i].x;
    stars[i].baseY = stars[i].y;
  }

  // Subtle constellation-like cluster above the wordmark
  const cx = W * 0.58;
  const cy = H * 0.30;
  const cluster = [
    { x: cx - 38, y: cy - 18, r: 1.4 },
    { x: cx - 10, y: cy - 6,  r: 1.1 },
    { x: cx + 16, y: cy + 8,  r: 1.3 },
    { x: cx + 43, y: cy - 3,  r: 1.0 },
    { x: cx + 72, y: cy + 14, r: 1.6 }
  ];
  cluster.forEach(s => stars.push({
    x: s.x, y: s.y, baseX: s.x, baseY: s.y,
    r: s.r,
    brightness: 0.74,
    twinkleSpeed: 0.25 + Math.random() * 0.5,
    twinklePhase: Math.random() * Math.PI * 2,
    driftAngle: Math.random() * Math.PI * 2,
    driftRadius: 0.08,
    age: Math.random() * 1000,
    color: '#edf3ff',
    cluster: true
  }));
}

function drawSky() {
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0,    '#01040a');
  grad.addColorStop(0.45, '#020814');
  grad.addColorStop(0.72, '#061122');
  grad.addColorStop(0.86, '#0a1730');
  grad.addColorStop(1,    '#01040a');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
}

function drawWater() {
  const grad = ctx.createLinearGradient(0, H * 0.72, 0, H);
  grad.addColorStop(0,    'rgba(1,4,10,0)');
  grad.addColorStop(0.22, 'rgba(1,4,10,0.55)');
  grad.addColorStop(1,    'rgba(1,4,10,1)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, H * 0.72, W, H);

  ctx.save();
  for (let i = 0; i < 6; i++) {
    const y = H * 0.772 + i * (H * 0.022);
    const alpha = 0.026 - i * 0.003;
    ctx.strokeStyle = `rgba(200,169,110,${Math.max(alpha, 0.004)})`;
    ctx.lineWidth = 0.45;
    ctx.beginPath();
    ctx.moveTo(W * 0.14, y + Math.sin(Date.now() * 0.00022 + i * 0.8) * 1.1);
    ctx.lineTo(W * 0.86, y + Math.sin(Date.now() * 0.00022 + i * 0.8 + 1.2) * 1.1);
    ctx.stroke();
  }
  ctx.restore();
}

function drawConstellationLines() {
  const cluster = stars.filter(s => s.cluster);
  if (cluster.length < 2) return;
  ctx.save();
  ctx.strokeStyle = 'rgba(220,232,255,0.10)';
  ctx.lineWidth = 0.45;
  ctx.beginPath();
  for (let i = 0; i < cluster.length - 1; i++) {
    ctx.moveTo(cluster[i].x, cluster[i].y);
    ctx.lineTo(cluster[i + 1].x, cluster[i + 1].y);
  }
  ctx.stroke();
  ctx.restore();
}

function drawStars() {
  globalAngle += ROTATION_SPEED;
  centerX = W * 0.52;
  centerY = H * 0.22;

  stars.forEach(s => {
    s.age += 0.016;

    if (!s.cluster) {
      const dx = s.baseX - centerX;
      const dy = s.baseY - centerY;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const baseAngle = Math.atan2(dy, dx);
      const newAngle = baseAngle + globalAngle * (1 - dist / (Math.max(W, H) * 0.9));
      const driftX = Math.cos(s.driftAngle + s.age * 0.07) * s.driftRadius;
      const driftY = Math.sin(s.driftAngle + s.age * 0.07) * s.driftRadius;
      s.x = centerX + Math.cos(newAngle) * dist + driftX;
      s.y = centerY + Math.sin(newAngle) * dist + driftY;
    }

    if (s.y > H * 0.745 || s.x < -8 || s.x > W + 8) return;

    const twinkle = 0.72 + 0.28 * Math.sin(s.age * s.twinkleSpeed + s.twinklePhase);
    const alpha = Math.min(1, s.brightness * twinkle);

    ctx.save();
    ctx.globalAlpha = alpha;

    if (s.r > 1.2) {
      const glow = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.r * 7);
      glow.addColorStop(0, s.color);
      glow.addColorStop(1, 'transparent');
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r * 7, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.fillStyle = s.color;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();

    if (s.r > 1.45 && twinkle > 0.83) {
      ctx.strokeStyle = s.color;
      ctx.globalAlpha = alpha * 0.26;
      ctx.lineWidth = 0.36;
      ctx.beginPath();
      ctx.moveTo(s.x - s.r * 4.4, s.y);
      ctx.lineTo(s.x + s.r * 4.4, s.y);
      ctx.moveTo(s.x, s.y - s.r * 4.4);
      ctx.lineTo(s.x, s.y + s.r * 4.4);
      ctx.stroke();
    }
    ctx.restore();
  });

  drawConstellationLines();

  ctx.save();
  ctx.globalAlpha = 0.05;
  stars.forEach(s => {
    if (s.r < 1.45 || s.y < H * 0.08) return;
    const reflectY = H * 0.76 + (H * 0.76 - s.y) * 0.12;
    if (reflectY < H * 0.75 || reflectY > H) return;
    const wobble = Math.sin(Date.now() * 0.0008 + s.x * 0.012) * 2.2;
    const grad = ctx.createLinearGradient(s.x + wobble, reflectY - 7, s.x + wobble, reflectY + 7);
    grad.addColorStop(0, 'transparent');
    grad.addColorStop(0.5, s.color);
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.fillRect(s.x + wobble - 0.55, reflectY - 7, 1.1, 14);
  });
  ctx.restore();
}

function maybeShootingStar() {
  if (Math.random() < 0.0012 && shootingStars.length < 1) {
    shootingStars.push({
      x: Math.random() * W * 0.35 + W * 0.4,
      y: Math.random() * H * 0.18 + H * 0.08,
      vx: 3 + Math.random() * 2.5,
      vy: 1 + Math.random() * 1.4,
      life: 1,
      len: 58 + Math.random() * 42
    });
  }
}

function drawShootingStars() {
  shootingStars = shootingStars.filter(s => s.life > 0);
  shootingStars.forEach(s => {
    s.x += s.vx;
    s.y += s.vy;
    s.life -= 0.02;
    if (s.life <= 0) return;

    const grad = ctx.createLinearGradient(s.x - s.vx * 8, s.y - s.vy * 8, s.x, s.y);
    grad.addColorStop(0, 'transparent');
    grad.addColorStop(1, `rgba(237,243,255,${s.life * 0.7})`);
    ctx.save();
    ctx.strokeStyle = grad;
    ctx.lineWidth = 0.9;
    ctx.beginPath();
    ctx.moveTo(s.x - s.len * (s.vx / 6), s.y - s.len * (s.vy / 6));
    ctx.lineTo(s.x, s.y);
    ctx.stroke();
    ctx.restore();
  });
}

function loop() {
  drawSky();
  drawStars();
  drawWater();
  drawShootingStars();
  maybeShootingStar();
  requestAnimationFrame(loop);
}

resize();
initStars();
loop();
window.addEventListener('resize', () => { resize(); initStars(); });
</script>
</body>
</html>
